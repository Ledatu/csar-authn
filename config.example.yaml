# --- Config Source ---
# By default csar-authn reads this file from disk.
# To load config from S3-compatible storage instead, use CLI flags or env vars:
#
#   --config-source / CONFIG_SOURCE          "file" (default) or "s3"
#   --config        / CONFIG_FILE            path to config file (file source, default: config.yaml)
#
# S3 source settings:
#   --config-s3-bucket          / CONFIG_S3_BUCKET              (required for s3)
#   --config-s3-key             / CONFIG_S3_KEY                 (default: config.yaml)
#   --config-s3-endpoint        / CONFIG_S3_ENDPOINT            (default: https://storage.yandexcloud.net)
#   --config-s3-region          / CONFIG_S3_REGION              (default: ru-central1)
#   --config-s3-auth-mode       / CONFIG_S3_AUTH_MODE           (default: static)
#   --config-s3-access-key-id   / CONFIG_S3_ACCESS_KEY_ID
#   --config-s3-secret-access-key / CONFIG_S3_SECRET_ACCESS_KEY
#   --config-s3-iam-token       / CONFIG_S3_IAM_TOKEN
#   --config-s3-oauth-token     / CONFIG_S3_OAUTH_TOKEN
#   --config-s3-sa-key-file     / CONFIG_S3_SA_KEY_FILE
#
# Optional periodic re-fetch (validates new config, hot-reload planned):
#   --config-refresh-interval   / CONFIG_REFRESH_INTERVAL       (default: 0 = disabled; e.g. "60s")

listen_addr: ":8081"
base_url: "http://localhost:8081"
frontend_url: "http://localhost:3000"

database:
  driver: "postgres"
  dsn: "postgres://csar:csar_dev@localhost:5432/csar_auth?sslmode=disable"

jwt:
  algorithm: "RS256"
  issuer: "http://localhost:8081"
  audience: "csar-api"
  ttl: "24h"
  auto_generate: true
  key_dir: "./keys"

oauth:
  session_secret: "${OAUTH_SESSION_SECRET}"
  providers:
    - name: "google"
      client_id: "${GOOGLE_CLIENT_ID}"
      client_secret: "${GOOGLE_CLIENT_SECRET}"
      scopes: ["openid", "email", "profile"]
      trusted: true      # Google always verifies emails
    - name: "github"
      client_id: "${GITHUB_CLIENT_ID}"
      client_secret: "${GITHUB_CLIENT_SECRET}"
      scopes: ["user:email"]
      trusted: true      # Goth's GitHub provider only returns verified primary emails
    - name: "discord"
      client_id: "${DISCORD_CLIENT_ID}"
      client_secret: "${DISCORD_CLIENT_SECRET}"
      scopes: ["identify", "email"]
      trusted: false     # Discord email verification is optional
    - name: "telegram"
      client_id: "${TELEGRAM_BOT_CLIENT_ID}"
      client_secret: "${TELEGRAM_BOT_CLIENT_SECRET}"
      scopes: ["openid", "profile", "phone"]
      trusted: false     # no email; phone is verified but trust flag is for email

cookie:
  name: "csar_session"
  secure: false
  same_site: "lax"

# --- Redis (optional) ---
# When configured, used for STS replay protection (preferred over Postgres).
# Falls back to Postgres or in-memory if not set.
#
# redis:
#   address: "localhost:6379"
#   password: "${REDIS_PASSWORD}"
#   db: 0

# --- STS: Service Token Exchange (optional) ---
# Enables service-to-service authentication via signed JWT assertions.
# Each service account gets a key pair; the public key is registered here.
# Services exchange short-lived signed assertions for scoped access tokens.
#
# sts:
#   enabled: true
#   assertion_max_age: "5m"    # max age of incoming assertion JWTs
#   service_accounts:
#     first-sa:
#       public_key_file: "/etc/csar-authn/keys/first-sa.pub"
#       allowed_audiences: ["first"]
#       allow_all_audiences: false  # UNSAFE for production with >1 audience; prefer explicit per-request audience
#       token_ttl: "1h"
#     second-sa:
#       public_key_file: "/etc/csar-authn/keys/second-sa.pub"
#       allowed_audiences: ["second"]
#       token_ttl: "30m"
